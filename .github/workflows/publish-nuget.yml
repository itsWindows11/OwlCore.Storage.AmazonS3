name: Publish NuGet

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ secrets.NUGET_API_KEY != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x

      - name: Restore
        run: dotnet restore src/OwlCore.Storage.AmazonS3.csproj

      - name: Build
        run: dotnet build src/OwlCore.Storage.AmazonS3.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack src/OwlCore.Storage.AmazonS3.csproj --configuration Release --no-build --output ./artifacts

      - name: Push to NuGet
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
