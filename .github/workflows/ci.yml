name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.tfm }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        tfm: [ netstandard2.0, net8.0, net9.0, net10.0 ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x

      - name: Restore library
        run: dotnet restore src/OwlCore.Storage.AmazonS3.csproj

      - name: Build library (${{ matrix.tfm }})
        run: dotnet build src/OwlCore.Storage.AmazonS3.csproj --framework ${{ matrix.tfm }} --configuration Release --no-restore

      - name: Restore tests (${{ matrix.tfm }})
        if: matrix.tfm != 'netstandard2.0'
        run: dotnet restore tests/OwlCore.Storage.AmazonS3.Tests.csproj -p:TargetFramework=${{ matrix.tfm }}

      - name: Build tests (${{ matrix.tfm }})
        if: matrix.tfm != 'netstandard2.0'
        run: dotnet build tests/OwlCore.Storage.AmazonS3.Tests.csproj -p:TargetFramework=${{ matrix.tfm }} --configuration Release --no-restore

      - name: Upload build outputs (${{ matrix.tfm }})
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs-${{ matrix.tfm }}
          path: |
            src/bin/Release/${{ matrix.tfm }}/**
            src/obj/Release/${{ matrix.tfm }}**
            tests/bin/Release/${{ matrix.tfm }}/**
            tests/obj/Release/${{ matrix.tfm }}/**

  test-supabase:
    name: Test (Supabase S3 ${{ matrix.tfm }})
    runs-on: ubuntu-latest
    needs: build
    environment: OcStorageTests
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        tfm: [ net8.0, net9.0, net10.0 ]

    env:
      SUPABASE_S3_ENDPOINT: ${{ secrets.SUPABASE_S3_ENDPOINT }}
      SUPABASE_S3_ACCESS_KEY: ${{ secrets.SUPABASE_S3_ACCESS_KEY }}
      SUPABASE_S3_SECRET_KEY: ${{ secrets.SUPABASE_S3_SECRET_KEY }}
      SUPABASE_S3_BUCKET: ${{ secrets.SUPABASE_S3_BUCKET }}
      SUPABASE_S3_REGION: ${{ vars.SUPABASE_S3_REGION }}
      SUPABASE_S3_FORCE_PATH_STYLE: ${{ vars.SUPABASE_S3_FORCE_PATH_STYLE }}

    steps:
      - name: Check secret availability
        id: secrets_check
        shell: bash
        run: |
          if [ -n "$SUPABASE_S3_ENDPOINT" ] && [ -n "$SUPABASE_S3_ACCESS_KEY" ] && [ -n "$SUPABASE_S3_SECRET_KEY" ] && [ -n "$SUPABASE_S3_BUCKET" ]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip Supabase tests (secrets unavailable)
        if: steps.secrets_check.outputs.run_tests != 'true'
        run: echo "Supabase secrets are not configured for this run. Skipping Supabase integration tests."

      - name: Setup .NET
        if: steps.secrets_check.outputs.run_tests == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x

      - name: Download build outputs
        if: steps.secrets_check.outputs.run_tests == 'true'
        uses: actions/download-artifact@v4
        with:
          name: build-outputs-${{ matrix.tfm }}
          path: .

      - name: Create CI runsettings
        if: steps.secrets_check.outputs.run_tests == 'true'
        shell: bash
        run: |
          cat > ci.runsettings <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <RunSettings>
            <RunConfiguration>
              <EnvironmentVariables>
                <SUPABASE_S3_ENDPOINT>${SUPABASE_S3_ENDPOINT}</SUPABASE_S3_ENDPOINT>
                <SUPABASE_S3_ACCESS_KEY>${SUPABASE_S3_ACCESS_KEY}</SUPABASE_S3_ACCESS_KEY>
                <SUPABASE_S3_SECRET_KEY>${SUPABASE_S3_SECRET_KEY}</SUPABASE_S3_SECRET_KEY>
                <SUPABASE_S3_BUCKET>${SUPABASE_S3_BUCKET}</SUPABASE_S3_BUCKET>
                <SUPABASE_S3_REGION>${SUPABASE_S3_REGION:-us-east-1}</SUPABASE_S3_REGION>
                <SUPABASE_S3_FORCE_PATH_STYLE>${SUPABASE_S3_FORCE_PATH_STYLE:-true}</SUPABASE_S3_FORCE_PATH_STYLE>
              </EnvironmentVariables>
            </RunConfiguration>
          </RunSettings>
          EOF

      - name: Test
        if: steps.secrets_check.outputs.run_tests == 'true'
        run: dotnet vstest tests/bin/Release/${{ matrix.tfm }}/OwlCore.Storage.AmazonS3.Tests.dll --Settings:ci.runsettings --logger:"console;verbosity=detailed" --logger:"trx;LogFileName=test-results-${{ matrix.tfm }}.trx"

      - name: Upload test results
        if: steps.secrets_check.outputs.run_tests == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.tfm }}
          path: |
            **/TestResults/**/*.trx
            test-results-${{ matrix.tfm }}.trx
